<script>
  async function createProject(formData) {
    try {
      const response = await fetch('https://seo-automation-p01f.onrender.com/api/projects', {
        method: 'POST',
        body: formData
      });
      if (!response.ok) throw new Error('Failed to create project');
      const data = await response.json();
      console.log('Project created:', data);
    } catch (error) {
      console.error('Error:', error);
    }
  }

  async function addClient(formData) {
    try {
      const response = await fetch('https://seo-automation-p01f.onrender.com/api/clients', {
        method: 'POST',
        body: formData
      });
      if (!response.ok) throw new Error('Failed to add client');
      const data = await response.json();
      console.log('Client added:', data);
    } catch (error) {
      console.error('Error:', error);
    }
  }

  async function submitReportAI(formData) {
    try {
      const response = await fetch('https://seo-automation-p01f.onrender.com/api/reports', {
        method: 'POST',
        body: formData
      });
      if (!response.ok) throw new Error('Failed to submit report');
      const data = await response.json();
      console.log('Report submitted:', data);
    } catch (error) {
      console.error('Error:', error);
    }
  }
</script>
